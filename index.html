<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ladoo Recipe Scaler</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; background-color: #f9f9f9; text-align: center; }
        .calculator { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 10px; font-size: 18px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; text-align: center; }
        h2 { color: #d35400; }
        .ingredients { text-align: left; margin-top: 20px; font-size: 18px; line-height: 2; }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Ladoo Calculator</h2>
    <p>Enter the number of ladoos you want to make:</p>
    
    <!-- This is the interactive "tab" box you can change -->
    <input type="number" id="ladooCount" value="1" min="1" oninput="updateRecipe()">

    <div class="ingredients">
        <div><strong>Wheat Flour:</strong> <span id="wheat"></span></div>
        <div><strong>Chana Flour:</strong> <span id="chana"></span></div>
        <div><strong>Jaggery:</strong> <span id="jaggery"></span></div>
        <div><strong>Ghee:</strong> <span id="ghee"></span></div>
    </div>
</div>

<script>
// Exact math for 1 single ladoo (Grams / 528)
const basePerLadoo = {
    wheatFlour: 9000 / 528,
    chanaFlour: 3000 / 528,
    jaggery: 6400 / 528,
    ghee: 4000 / 528
};

function formatWeight(totalGrams) {
    if (totalGrams >= 1000) {
        let kg = Math.floor(totalGrams / 1000);
        let g = Math.round(totalGrams % 1000);
        return `${kg}kg ${g}g`;
    } else {
        return `${Math.round(totalGrams)}g`;
    }
}

function updateRecipe() {
    // Get the number the user typed in
    let count = parseFloat(document.getElementById('ladooCount').value) || 0;

    // Calculate and update the UI instantly
    document.getElementById('wheat').innerText = formatWeight(basePerLadoo.wheatFlour * count);
    document.getElementById('chana').innerText = formatWeight(basePerLadoo.chanaFlour * count);
    document.getElementById('jaggery').innerText = formatWeight(basePerLadoo.jaggery * count);
    document.getElementById('ghee').innerText = formatWeight(basePerLadoo.ghee * count);
}

// Run once on load to show measurements for 1 ladoo initially
updateRecipe();
</script>

</body>
</html>
